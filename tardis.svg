<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 184" shape-rendering="crispEdges" width="128" height="184">
  <!-- TARDIS pixel art — 16×23 grid @ 8px/pixel -->

  <!-- ── FULL BLUE BODY (rows 4–22, y=32–184) ── -->
  <rect x="0" y="32" width="128" height="152" fill="#1A56B0"/>

  <!-- ── SIGN (rows 2–3, y=16–32, cols 1–14) ── -->
  <rect x="8"  y="16" width="112" height="16" fill="#C8DCEE"/>
  <!-- "POLICE PUBLIC CALL BOX" suggested by pixel lines -->
  <rect x="14" y="20" width="38" height="2" fill="#1A56B0" opacity="0.55"/>
  <rect x="14" y="24" width="28" height="2" fill="#1A56B0" opacity="0.35"/>
  <rect x="76" y="20" width="38" height="2" fill="#1A56B0" opacity="0.55"/>
  <rect x="76" y="24" width="28" height="2" fill="#1A56B0" opacity="0.35"/>

  <!-- ── WINDOW BANK 1 (rows 5–7, y=40–64) ── -->
  <rect x="8"  y="40" width="24" height="24" fill="#8DC8EE"/>
  <rect x="48" y="40" width="24" height="24" fill="#8DC8EE"/>
  <rect x="88" y="40" width="24" height="24" fill="#8DC8EE"/>
  <!-- window inner glow -->
  <rect x="10" y="42" width="20" height="20" fill="#B8DEFF"/>
  <rect x="50" y="42" width="20" height="20" fill="#B8DEFF"/>
  <rect x="90" y="42" width="20" height="20" fill="#B8DEFF"/>

  <!-- ── BAND (row 8, y=64–72) — already blue ── -->
  <rect x="0"  y="64" width="128" height="2" fill="#0D2E6E"/>
  <rect x="0"  y="70" width="128" height="2" fill="#0D2E6E"/>

  <!-- ── WINDOW BANK 2 (rows 9–11, y=72–96) ── -->
  <rect x="8"  y="72" width="24" height="24" fill="#8DC8EE"/>
  <rect x="48" y="72" width="24" height="24" fill="#8DC8EE"/>
  <rect x="88" y="72" width="24" height="24" fill="#8DC8EE"/>
  <rect x="10" y="74" width="20" height="20" fill="#B8DEFF"/>
  <rect x="50" y="74" width="20" height="20" fill="#B8DEFF"/>
  <rect x="90" y="74" width="20" height="20" fill="#B8DEFF"/>

  <!-- ── BAND (row 12, y=96–104) ── -->
  <rect x="0"  y="96"  width="128" height="2" fill="#0D2E6E"/>
  <rect x="0"  y="102" width="128" height="2" fill="#0D2E6E"/>

  <!-- ── DOOR (rows 13–21, y=104–176, cols 3–12, x=24 w=80) ── -->
  <rect x="24" y="104" width="80" height="72" fill="#0D2E6E"/>
  <!-- center door split -->
  <rect x="63" y="104" width="2" height="72" fill="#1A56B0" opacity="0.4"/>

  <!-- Door windows TOP (rows 15–16, y=120–136) -->
  <!-- left: cols 4–5 → x=32, w=16 -->
  <rect x="32" y="120" width="16" height="16" fill="#8DC8EE"/>
  <rect x="33" y="121" width="14" height="14" fill="#B8DEFF"/>
  <!-- right: cols 10–11 → x=80, w=16 -->
  <rect x="80" y="120" width="16" height="16" fill="#8DC8EE"/>
  <rect x="81" y="121" width="14" height="14" fill="#B8DEFF"/>

  <!-- mid door band: row 17, y=136–144 (already dark) -->
  <rect x="24" y="139" width="80" height="2" fill="#061A42"/>

  <!-- Door windows BOTTOM (rows 18–19, y=144–160) -->
  <rect x="32" y="144" width="16" height="16" fill="#8DC8EE"/>
  <rect x="33" y="145" width="14" height="14" fill="#B8DEFF"/>
  <rect x="80" y="144" width="16" height="16" fill="#8DC8EE"/>
  <rect x="81" y="145" width="14" height="14" fill="#B8DEFF"/>

  <!-- ── BASE (rows 22, y=176–184) ── -->
  <rect x="0" y="176" width="128" height="8" fill="#0D2E6E"/>

  <!-- ── LAMP (rows 0–1) ── -->
  <!-- col 7 (x=56), row 0 (y=0) -->
  <rect x="56" y="0"  width="8"  height="8"  fill="#FFD700"/>
  <!-- cols 6–8 (x=48, w=24), row 1 (y=8) -->
  <rect x="48" y="8"  width="24" height="8"  fill="#FFC200"/>
  <!-- lamp glow -->
  <rect x="44" y="12" width="32" height="4"  fill="#FFD700" opacity="0.4"/>

  <!-- ── TOP EDGE SHADING ── -->
  <rect x="0"  y="32" width="128" height="2" fill="#0D2E6E"/>
  <rect x="0"  y="34" width="2"   height="142" fill="#0D2E6E"/>
  <rect x="126" y="34" width="2"  height="142" fill="#0D2E6E"/>

</svg>

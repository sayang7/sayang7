<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 144" shape-rendering="crispEdges" width="96" height="144">

  <!-- ── HAIR (rows 0-1) ── -->
  <rect x="16" y="0"  width="64" height="8"  fill="#1A1A2E"/>
  <rect x="8"  y="8"  width="80" height="8"  fill="#1A1A2E"/>

  <!-- ── FACE base (rows 2-5) ── -->
  <rect x="8"  y="16" width="80" height="32" fill="#FFB347"/>

  <!-- Eyes at row 3 (y=24) -->
  <rect x="16" y="24" width="8"  height="8"  fill="#1A1A2E"/>
  <rect x="72" y="24" width="8"  height="8"  fill="#1A1A2E"/>
  <!-- Eye shine -->
  <rect x="16" y="24" width="3"  height="3"  fill="#FFFFFF"/>
  <rect x="72" y="24" width="3"  height="3"  fill="#FFFFFF"/>

  <!-- ── COLLAR / SHOULDERS (row 6) ── -->
  <rect x="8"  y="48" width="80" height="8"  fill="#1A56B0"/>

  <!-- ── BODY (rows 7-8) ── -->
  <rect x="0"  y="56" width="96" height="16" fill="#1A56B0"/>
  <!-- subtle body stripe -->
  <rect x="40" y="56" width="16" height="16" fill="#154DA0"/>

  <!-- ── ARMS + CONTROLLER (rows 9-10) ── -->
  <!-- arm sleeves -->
  <rect x="0"  y="72" width="8"  height="16" fill="#1A56B0"/>
  <rect x="88" y="72" width="8"  height="16" fill="#1A56B0"/>
  <!-- controller body -->
  <rect x="8"  y="72" width="80" height="16" fill="#2D2D2D"/>
  <!-- controller shoulder bumpers -->
  <rect x="8"  y="72" width="16" height="4"  fill="#444444"/>
  <rect x="72" y="72" width="16" height="4"  fill="#444444"/>
  <!-- d-pad -->
  <rect x="20" y="80" width="4"  height="4"  fill="#888888"/>
  <rect x="16" y="84" width="12" height="4"  fill="#888888"/>
  <rect x="20" y="88" width="4"  height="4"  fill="#888888"/>
  <!-- action buttons -->
  <rect x="64" y="80" width="6"  height="6"  fill="#FF4455"/>
  <rect x="72" y="80" width="6"  height="6"  fill="#FFDD44"/>
  <rect x="68" y="86" width="6"  height="6"  fill="#4488FF"/>
  <!-- center select/start -->
  <rect x="40" y="82" width="6"  height="4"  fill="#555555"/>
  <rect x="50" y="82" width="6"  height="4"  fill="#555555"/>

  <!-- ── LOWER BODY (row 11) ── -->
  <rect x="16" y="88" width="64" height="8"  fill="#1A56B0"/>

  <!-- ── LEGS (rows 12-15) ── -->
  <rect x="16" y="96" width="20" height="32" fill="#1A56B0"/>
  <rect x="60" y="96" width="20" height="32" fill="#1A56B0"/>
  <!-- leg shading -->
  <rect x="32" y="96" width="4"  height="32" fill="#154DA0"/>
  <rect x="60" y="96" width="4"  height="32" fill="#154DA0"/>

  <!-- ── BOOTS (rows 16-17) ── -->
  <rect x="12" y="128" width="28" height="16" fill="#1A1A2E"/>
  <rect x="56" y="128" width="28" height="16" fill="#1A1A2E"/>
  <!-- boot highlight -->
  <rect x="12" y="128" width="28" height="4"  fill="#2D2D3E"/>
  <rect x="56" y="128" width="28" height="4"  fill="#2D2D3E"/>

</svg>

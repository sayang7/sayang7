<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 60" width="900" height="60" shape-rendering="crispEdges">
  <defs>
    <radialGradient id="nb1" cx="18%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb2" cx="82%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#1A56B0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A56B0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb3" cx="50%" cy="50%" r="20%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes t1{0%,100%{opacity:1}50%{opacity:.08}}
      @keyframes t2{0%,100%{opacity:.4}50%{opacity:1}}
      @keyframes t3{0%{opacity:.9}35%{opacity:.1}70%{opacity:.8}100%{opacity:.9}}
      @keyframes t4{0%,100%{opacity:.6}50%{opacity:.05}}
      @keyframes t5{0%,100%{opacity:1}50%{opacity:.3}}
      @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
      .a1{animation:t1 2.1s ease-in-out infinite}
      .a2{animation:t2 3.4s ease-in-out infinite}
      .a3{animation:t3 1.8s ease-in-out infinite}
      .a4{animation:t4 4.5s ease-in-out infinite}
      .a5{animation:t5 2.8s .6s ease-in-out infinite}
      .a6{animation:t2 1.5s 1.1s ease-in-out infinite}
      .td{animation:drift 4.2s ease-in-out infinite}
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="60" fill="#0a0d1a"/>
  <!-- Nebulas -->
  <rect width="900" height="60" fill="url(#nb1)"/>
  <rect width="900" height="60" fill="url(#nb2)"/>
  <rect width="900" height="60" fill="url(#nb3)"/>

  <!-- Stars: group 1 - white, 2.1s -->
  <g class="a1" fill="#ffffff">
    <circle cx="18"  cy="10" r="1"/><circle cx="95"  cy="4"  r="1"/>
    <circle cx="190" cy="14" r="1"/><circle cx="310" cy="6"  r="1"/>
    <circle cx="420" cy="18" r="1"/><circle cx="530" cy="3"  r="1"/>
    <circle cx="640" cy="12" r="1"/><circle cx="760" cy="8"  r="1"/>
    <circle cx="870" cy="16" r="1"/><circle cx="55"  cy="40" r="1"/>
    <circle cx="175" cy="50" r="1"/><circle cx="295" cy="38" r="1"/>
    <circle cx="415" cy="54" r="1"/><circle cx="535" cy="44" r="1"/>
    <circle cx="655" cy="52" r="1"/><circle cx="775" cy="36" r="1"/>
    <circle cx="885" cy="48" r="1"/>
  </g>
  <!-- Stars: group 2 - blue-white, 3.4s -->
  <g class="a2" fill="#c4d8ff">
    <circle cx="45"  cy="25" r="1"/><circle cx="140" cy="8"  r="1"/>
    <circle cx="250" cy="30" r="1"/><circle cx="365" cy="12" r="1"/>
    <circle cx="470" cy="22" r="1"/><circle cx="580" cy="35" r="1"/>
    <circle cx="695" cy="5"  r="1"/><circle cx="800" cy="28" r="1"/>
    <circle cx="110" cy="52" r="1"/><circle cx="230" cy="45" r="1"/>
    <circle cx="350" cy="56" r="1"/><circle cx="470" cy="42" r="1"/>
    <circle cx="590" cy="55" r="1"/><circle cx="710" cy="46" r="1"/>
    <circle cx="830" cy="58" r="1"/>
  </g>
  <!-- Stars: group 3 - warm, 1.8s -->
  <g class="a3" fill="#ffe4b5">
    <circle cx="72"  cy="16" r="1"/><circle cx="200" cy="38" r="1"/>
    <circle cx="328" cy="20" r="1"/><circle cx="456" cy="48" r="1"/>
    <circle cx="584" cy="18" r="1"/><circle cx="712" cy="42" r="1"/>
    <circle cx="840" cy="24" r="1"/><circle cx="158" cy="30" r="1"/>
    <circle cx="506" cy="32" r="1"/>
  </g>
  <!-- Stars: group 4 - dim, 4.5s -->
  <g class="a4" fill="#9999bb">
    <circle cx="130" cy="22" r="1"/><circle cx="380" cy="44" r="1"/>
    <circle cx="620" cy="28" r="1"/><circle cx="860" cy="50" r="1"/>
    <circle cx="260" cy="10" r="1"/><circle cx="500" cy="58" r="1"/>
  </g>
  <!-- Medium stars: r=1.5 -->
  <circle cx="165" cy="20" r="1.5" fill="#ffffff" class="a2"/>
  <circle cx="440" cy="10" r="1.5" fill="#ffffff" class="a3"/>
  <circle cx="715" cy="35" r="1.5" fill="#c4d8ff" class="a5"/>
  <circle cx="320" cy="50" r="1.5" fill="#ffe4b5" class="a1"/>
  <circle cx="560" cy="25" r="1.5" fill="#ffffff" class="a6"/>

  <!-- Bright stars: r=2 -->
  <circle cx="210" cy="14" r="2" fill="#ffffff" class="a3"/>
  <circle cx="510" cy="30" r="2" fill="#ffffff" class="a1"/>
  <circle cx="780" cy="18" r="2" fill="#ffe4b5" class="a2"/>

  <!-- Mini pixel TARDIS (floating) — 2px/pixel scale, positioned left-center -->
  <g class="td">
    <!-- lamp -->
    <rect x="118" y="3"  width="2" height="2" fill="#FFD700"/>
    <rect x="116" y="5"  width="6" height="2" fill="#FFC200"/>
    <!-- sign -->
    <rect x="108" y="7"  width="22" height="4" fill="#C8DCEE"/>
    <!-- body -->
    <rect x="108" y="11" width="22" height="32" fill="#1A56B0"/>
    <!-- windows row 1 -->
    <rect x="110" y="13" width="4" height="4" fill="#B8DEFF"/>
    <rect x="116" y="13" width="4" height="4" fill="#B8DEFF"/>
    <rect x="122" y="13" width="4" height="4" fill="#B8DEFF"/>
    <!-- windows row 2 -->
    <rect x="110" y="19" width="4" height="4" fill="#B8DEFF"/>
    <rect x="116" y="19" width="4" height="4" fill="#B8DEFF"/>
    <rect x="122" y="19" width="4" height="4" fill="#B8DEFF"/>
    <!-- door -->
    <rect x="112" y="25" width="14" height="14" fill="#0D2E6E"/>
    <rect x="113" y="27" width="4" height="4" fill="#B8DEFF"/>
    <rect x="119" y="27" width="4" height="4" fill="#B8DEFF"/>
    <rect x="113" y="33" width="4" height="4" fill="#B8DEFF"/>
    <rect x="119" y="33" width="4" height="4" fill="#B8DEFF"/>
    <!-- base -->
    <rect x="108" y="43" width="22" height="2" fill="#0D2E6E"/>
  </g>

  <!-- Pixel ringed planet (right side) -->
  <!-- ring back -->
  <ellipse cx="840" cy="32" rx="26" ry="5" fill="none" stroke="#8B5523" stroke-width="3" opacity="0.5"/>
  <!-- planet body -->
  <circle cx="840" cy="32" r="16" fill="#CC7A3B"/>
  <ellipse cx="840" cy="29" rx="15" ry="4" fill="#B86828" opacity="0.5"/>
  <ellipse cx="840" cy="35" rx="13" ry="3" fill="#E8943A" opacity="0.35"/>
  <circle cx="833" cy="26" r="3" fill="#A05A20" opacity="0.6"/>
  <!-- ring front -->
  <ellipse cx="840" cy="32" rx="26" ry="5" fill="none" stroke="#E8A060" stroke-width="2" stroke-dasharray="42 52" opacity="0.95"/>

  <!-- Distant small planet -->
  <circle cx="30" cy="42" r="6" fill="#2D4B8E" opacity="0.7"/>
  <circle cx="29" cy="40" r="2" fill="#1A3570" opacity="0.5"/>
</svg>
